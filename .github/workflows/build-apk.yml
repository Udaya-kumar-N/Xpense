name: Build Debug APK

# Runs automatically every time you push code, and can also be triggered
# manually from the Actions tab on GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug - list checked out files
        run: |
          echo "Current directory:"
          pwd
          echo "Files at root:"
          ls -la
          echo "Files in app folder (if it exists):"
          ls -la app || echo "app folder not found"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk